name: Docs

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    name: Build & Deploy Docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate docs
        run: npm run docs --workspaces --if-present

      - name: Assemble site
        run: |
          mkdir -p _site/npm _site/gh _site/bp _site/osv
          cp -r packages/npm/docs/. _site/npm/
          cp -r packages/gh/docs/.  _site/gh/
          cp -r packages/bp/docs/.  _site/bp/
          cp -r packages/osv/docs/. _site/osv/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  # ── 1. Build all packages ────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm run test:coverage

      - run: npm run build

      - name: Upload npm dist
        uses: actions/upload-artifact@v4
        with:
          name: dist-npm
          path: packages/npm/dist/

      - name: Upload gh dist
        uses: actions/upload-artifact@v4
        with:
          name: dist-gh
          path: packages/gh/dist/

      - name: Upload bp dist
        uses: actions/upload-artifact@v4
        with:
          name: dist-bp
          path: packages/bp/dist/

      - name: Upload osv dist
        uses: actions/upload-artifact@v4
        with:
          name: dist-osv
          path: packages/osv/dist/

  # ── 2a. Release @api-hooks/npm ────────────────────────────────────────────
  release-npm:
    name: Release @api-hooks/npm
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Download npm dist
        uses: actions/download-artifact@v4
        with:
          name: dist-npm
          path: packages/npm/dist/

      - name: Release
        working-directory: packages/npm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx semantic-release

  # ── 2b. Release @api-hooks/gh ─────────────────────────────────────────────
  release-gh:
    name: Release @api-hooks/gh
    needs: release-npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Download gh dist
        uses: actions/download-artifact@v4
        with:
          name: dist-gh
          path: packages/gh/dist/

      - name: Release
        working-directory: packages/gh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx semantic-release

  # ── 2c. Release @api-hooks/bp ─────────────────────────────────────────────
  release-bp:
    name: Release @api-hooks/bp
    needs: release-gh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Download bp dist
        uses: actions/download-artifact@v4
        with:
          name: dist-bp
          path: packages/bp/dist/

      - name: Release
        working-directory: packages/bp
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx semantic-release

  # ── 2d. Release @api-hooks/osv ────────────────────────────────────────────
  release-osv:
    name: Release @api-hooks/osv
    needs: release-bp
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Download osv dist
        uses: actions/download-artifact@v4
        with:
          name: dist-osv
          path: packages/osv/dist/

      - name: Release
        working-directory: packages/osv
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx semantic-release
